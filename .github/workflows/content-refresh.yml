name: Refresh content (good news)
on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch: {}    # manual run button in the Actions tab
permissions:
  contents: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Selftest (offline logic checks)
        run: node scripts/refresh-content.mjs --selftest
      - name: Refresh news from outlet RSS feeds
        run: node scripts/refresh-content.mjs
      - name: Commit and push if changed
        run: |
          if git diff --quiet hopeling-web/content.json; then
            echo "No changes this week."
          else
            git config user.name "hopeling-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add hopeling-web/content.json
            git commit -m "Auto-refresh good news (weekly bot run)"
            git push
          fi
