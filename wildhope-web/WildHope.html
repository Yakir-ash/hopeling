<style>
  :root{
    --forest:#2E6B4F; --forest-c:#B2F1CC; --ocean:#3E6373; --terra:#F0BE8C;
    --bg:#F8FAF5; --card:#ffffff; --line:#dbe6dc; --tx:#14251c; --tx2:#5f6d63; --success:#386A20;
    --g0:#e7eee7; --g1:#B2F1CC; --g2:#63c48b; --g3:#2E6B4F;
  }
  html[data-theme="dark"]{
    --forest:#8FD5AF; --forest-c:#14513A; --ocean:#A6CCDF; --terra:#F0BE8C;
    --bg:#101512; --card:#182019; --line:#2a352c; --tx:#e6f0e8; --tx2:#9db0a2; --success:#9CD67D;
    --g0:#20291f; --g1:#14513A; --g2:#3f8f63; --g3:#8FD5AF;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  button{color:inherit}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    background:var(--bg);color:var(--tx);padding-bottom:78px}
  :focus-visible{outline:3px solid var(--forest);outline-offset:2px;border-radius:8px}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
  .top{position:sticky;top:0;z-index:10;background:var(--bg);display:flex;align-items:center;
    padding:14px 16px 10px;border-bottom:0.5px solid var(--line)}
  .top h1{font-size:18px;margin:0;font-weight:600}
  .top .streak{margin-left:auto;font-size:15px}
  .top .tbtn{background:none;border:0;color:var(--tx);font-size:18px;margin-left:12px;cursor:pointer;padding:4px}
  .wrap{padding:14px 16px;max-width:520px;margin:0 auto;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}
  .card{background:var(--card);border:0.5px solid var(--line);border-radius:20px;padding:16px;margin-bottom:12px}
  .grad{border-radius:20px;padding:18px;margin-bottom:12px;color:#fff}
  .g-forest{background:linear-gradient(120deg,#2E6B4F,#3E6373)}
  .g-ocean{background:linear-gradient(120deg,#0B3D4C,#123A2E)}
  .g-terra{background:linear-gradient(120deg,#F0BE8C,#E88D67);color:#4a2c10}
  .lbl{font-size:11px;letter-spacing:.6px;opacity:.85;font-weight:600}
  .fact{font-family:Georgia,"Times New Roman",serif;font-style:italic;font-size:18px;line-height:1.5;margin-top:8px}
  h2.sec{font-size:16px;margin:16px 0 8px;font-weight:600}
  .muted{color:var(--tx2);font-size:13px}
  .pips{display:inline-flex;align-items:center;gap:3px;vertical-align:middle}
  .pip{width:8px;height:8px;border-radius:4px;background:var(--line)}
  .pip.on{background:var(--forest)}
  .row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
  .row::-webkit-scrollbar{display:none}
  .chip{font-size:12px;border:0.5px solid var(--line);border-radius:20px;padding:6px 12px;color:var(--tx2);
    background:none;cursor:pointer;white-space:nowrap;font-family:inherit}
  .chip.sel{background:var(--forest-c);color:var(--forest);border-color:transparent;font-weight:600}
  html[data-theme="dark"] .chip.sel{color:#D9F7E6}
  .btn{width:100%;margin-top:12px;background:var(--forest-c);border:none;color:#0d3a26;border-radius:12px;
    padding:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:transform .1s}
  .btn:active{transform:scale(.98)}
  html[data-theme="dark"] .btn{color:#D9F7E6}
  .btn.done{background:var(--success);color:#fff;animation:pop .4s ease}
  html[data-theme="dark"] .btn.done{color:#10290a}
  .btn.ghost{background:none;border:0.5px solid var(--line);color:var(--tx)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .cat{background:var(--card);border:0.5px solid var(--line);border-radius:16px;padding:14px 6px;text-align:center;cursor:pointer}
  .cat .emo{font-size:28px}
  .cat .nm{font-size:11px;margin-top:4px}
  .metric{background:var(--card);border:0.5px solid var(--line);border-radius:16px;padding:14px}
  .metric .v{font-size:22px;font-weight:700;color:var(--forest)}
  .metric .m{font-size:12px;margin-top:2px}
  .iucn{font-size:11px;font-weight:600;border-radius:8px;padding:3px 8px;display:inline-block}
  .nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--card);border-top:0.5px solid var(--line);
    max-width:520px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}
  .nav button{flex:1;text-align:center;padding:9px 0;cursor:pointer;color:var(--tx2);font-size:11px;background:none;border:0;font-family:inherit}
  .nav button.on{color:var(--forest)}
  .nav button .i{font-size:19px;display:block}
  .sheet{position:fixed;inset:0;background:var(--bg);z-index:30;overflow-y:auto;display:none}
  .sheet.open{display:block;animation:fade .2s ease}
  .sheet .shead{position:sticky;top:0;background:var(--bg);display:flex;align-items:center;padding:14px 16px;border-bottom:0.5px solid var(--line)}
  .sheet .shead button{background:none;border:0;font-size:20px;color:var(--tx);cursor:pointer;margin-right:10px}
  .toast{position:fixed;left:50%;bottom:92px;transform:translateX(-50%) translateY(10px);background:var(--success);color:#fff;
    padding:11px 20px;border-radius:24px;font-size:14px;font-weight:600;opacity:0;transition:.3s;z-index:50;pointer-events:none;text-align:center;max-width:90%}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .tabbar{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;border-bottom:0.5px solid var(--line)}
  .tabbar button{background:none;border:0;color:var(--tx2);font-size:14px;padding:6px 4px;cursor:pointer;white-space:nowrap;font-weight:500;font-family:inherit}
  .tabbar button.on{color:var(--forest);border-bottom:2px solid var(--forest)}
  .ob{position:fixed;inset:0;background:var(--bg);z-index:60;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:28px;text-align:center;overflow-y:auto}
  .ob.hide{display:none}
  .evidence{font-size:12px;color:var(--forest);text-decoration:none}
  .steps li{margin:4px 0;font-size:14px}
  .lesson{border:0.5px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px;cursor:pointer}
  .qopt{border:0.5px solid var(--line);border-radius:10px;padding:10px;margin:6px 0;cursor:pointer;font-size:14px}
  .qopt.right{background:var(--forest-c);border-color:transparent}
  html[data-theme="dark"] .qopt.right{color:#D9F7E6}
  .qopt.wrong{background:#F7C1C1;border-color:transparent;color:#7a1f1f}
  /* impact graph */
  .graphwrap{overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
  .graphwrap::-webkit-scrollbar{display:none}
  .graph{display:flex;gap:3px}
  .gcol{display:flex;flex-direction:column;gap:3px}
  .gcell{width:11px;height:11px;border-radius:3px;background:var(--g0)}
  .settingrow{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:0.5px solid var(--line)}
  .settingrow:last-child{border-bottom:0}
  .installbar{background:var(--forest-c);color:#0d3a26;border-radius:14px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;font-size:13px}
  html[data-theme="dark"] .installbar{color:#D9F7E6}
  /* grove companion */
  .grove{text-align:center;cursor:pointer;width:100%;font-family:inherit;font-size:inherit}
  .grove .tree{display:inline-block;animation:sway 5s ease-in-out infinite;transform-origin:50% 90%;line-height:1.15}
  @keyframes sway{0%,100%{transform:rotate(-2.5deg)}50%{transform:rotate(2.5deg)}}
  .grove .friends{font-size:20px;letter-spacing:6px;min-height:26px;margin-bottom:2px}
  /* photo hero (fact card) — gradient fallback, photo fades in over it */
  .hero{position:relative;overflow:hidden;min-height:150px}
  .heroimg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity .6s ease}
  .heroimg.show{opacity:1}
  .heroscrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.25),rgba(0,0,0,.65));opacity:0;transition:opacity .6s ease}
  .heroimg.show~.heroscrim{opacity:1}
  .herobody{position:relative;z-index:1}
  .herocap{display:none;margin-top:10px;background:rgba(0,0,0,.35);border:0;color:#fff;border-radius:20px;padding:5px 10px;font-size:11px;cursor:pointer;font-family:inherit}
  /* celebration burst */
  .burst{position:fixed;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:70;overflow:hidden}
  .burst span{position:absolute;font-size:16px;animation:bfall 900ms ease-out forwards}
  @keyframes bfall{0%{transform:translate(0,0) scale(.6);opacity:1}100%{transform:translate(var(--dx),var(--dy)) rotate(var(--rot)) scale(1.15);opacity:0}}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;color:var(--tx2);margin-bottom:4px}
  .field input,.field select,#sq{width:100%;padding:11px;border:0.5px solid var(--line);border-radius:12px;background:var(--card);color:var(--tx);font-size:16px;font-family:inherit}
</style>
</head>
<body>

<div id="onboard" class="ob">
  <div style="font-size:44px" aria-hidden="true">🌿</div>
  <h1 style="font-size:28px;margin:6px 0 2px">WildHope</h1>
  <div class="muted" style="font-size:15px">Small actions. Real hope.</div>
  <h2 class="sec" style="margin-top:26px">What do you care about most?</h2>
  <div class="muted" style="margin-bottom:14px">We'll tailor your daily action and facts.</div>
  <div id="obchips" class="row" style="flex-wrap:wrap;justify-content:center;overflow:visible"></div>
  <button class="btn" style="max-width:280px;margin-top:26px" onclick="finishOnboard()">Start</button>
  <button class="btn ghost" style="max-width:280px" onclick="finishOnboard(true)">Skip for now</button>
</div>

<div class="top">
  <h1>🌿 WildHope</h1>
  <span class="streak" id="topStreak" aria-live="polite">🔥 0</span>
  <button class="tbtn" onclick="openSearch()" aria-label="Search">🔍</button>
  <button class="tbtn" id="themeBtn" onclick="toggleTheme()" aria-label="Toggle dark mode">🌙</button>
</div>

<div id="app" class="wrap" role="main"></div>

<div id="sheet" class="sheet" role="dialog" aria-modal="true"></div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<input type="file" id="importfile" accept="application/json" style="display:none" onchange="importProgress(event)"/>
<nav class="nav" id="nav" aria-label="Main"></nav>

<script>
/* ---------------- persistent state ---------------- */
var LS = { get:function(k,d){try{var v=localStorage.getItem('wh_'+k);return v==null?d:JSON.parse(v)}catch(e){return d}},
           set:function(k,v){try{localStorage.setItem('wh_'+k,JSON.stringify(v))}catch(e){}} };
var state = {
  xp: LS.get('xp',0), streak: LS.get('streak',0), last: LS.get('last',null),
  done: LS.get('done',{}), lessons: LS.get('lessons',{}), badges: LS.get('badges',{}),
  totals: LS.get('totals',{}), causes: LS.get('causes',[]), theme: LS.get('theme',null),
  onboarded: LS.get('onboarded',false), log: LS.get('log',{}), remind: LS.get('remind',false),
  lastRemind: LS.get('lastRemind',null), freezes: LS.get('freezes',0),
  customActions: LS.get('customActions',{}), missionWeek: LS.get('missionWeek',null), chDone: LS.get('chDone',null),
  missions: LS.get('missions',{}), missionIds: LS.get('missionIds',[]), lastRepair: LS.get('lastRepair',null),
  milestones: LS.get('milestones',{}), recapWeek: LS.get('recapWeek',null), lastBackup: LS.get('lastBackup',null)
};
var SAVE_KEYS=['xp','streak','last','done','lessons','badges','totals','causes','theme','onboarded','log','remind','lastRemind','freezes','customActions','missionWeek','missions','missionIds','lastRepair','chDone','milestones','recapWeek','lastBackup'];
function save(){SAVE_KEYS.forEach(function(k){LS.set(k,state[k])});}
function dkey(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function today(){return dkey(new Date());}
function logToday(){var t=today();state.log[t]=(state.log[t]||0)+1;}

function levelForXp(xp){var lvl=1;while(xp>=Math.floor(100*Math.pow(lvl,1.5))&&lvl<99){xp-=Math.floor(100*Math.pow(lvl,1.5));lvl++;}return lvl;}
var LEVEL_NAMES=["Seed","Sprout","Seedling","Sapling","Young Tree","Grove Keeper","Forest Friend","Wild Guardian","Earth Ally","WildHope Champion"];
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function touchStreak(){
  var t=today();if(state.last===t)return;
  if(state.last){
    var gap=daysBetween(state.last,t);
    if(gap===1){state.streak++;}
    else if(gap===2&&(state.freezes||0)>0){state.freezes--;state.streak++;state._freezeUsed=true;}
    else {state.streak=1;}
  } else {state.streak=1;}
  state.last=t;
  if(state.streak>0&&state.streak%7===0&&(state.freezes||0)<3){state.freezes=(state.freezes||0)+1;state._freezeEarned=true;}
  GROVE_FRIENDS.forEach(function(fr){if(state.streak===fr[0]&&!state.milestones['friend'+fr[0]]){state.milestones['friend'+fr[0]]=1;state._newFriend=fr[1]+' '+fr[2].replace(/^an? /,'');}});
}
/* Repair: if you missed exactly yesterday, restore the streak (hope over guilt). */
function weekAgoStats(){
  var total=0,days=0;
  for(var i=1;i<=7;i++){var c=state.log[dkey(new Date(Date.now()-86400000*i))]||0;if(c>0){days++;total+=c;}}
  return [total,days];
}
function dismissRecap(){state.recapWeek=weekKey();save();render();}
function backupDue(){
  if(state.xp<50)return false;
  return state.lastBackup?daysBetween(state.lastBackup,today())>=14:true;
}
function repairable(){return state.last&&daysBetween(state.last,today())===2&&state.streak>=2&&state.lastRepair!==today();}
function repairStreak(){state.last=dkey(new Date(Date.now()-86400000));state.lastRepair=today();save();toast('Streak repaired 🌱 — do today\'s action to keep it!');render();}

function weekKey(){var d=new Date();var oj=new Date(d.getFullYear(),0,1);var w=Math.ceil((((d-oj)/86400000)+oj.getDay()+1)/7);return d.getFullYear()+'-W'+w;}
function ensureMissions(){
  if(state.missionWeek!==weekKey()){
    state.missionWeek=weekKey();state.missions={};
    var wk=weekKey(),h=0;for(var i=0;i<wk.length;i++)h=(h*31+wk.charCodeAt(i))>>>0;
    var chosen=[];[h,h>>>3,h>>>6,h>>>9].forEach(function(v){var idx=v%MISSION_POOL.length;if(chosen.indexOf(idx)<0&&chosen.length<3)chosen.push(idx);});
    for(var j=0;j<MISSION_POOL.length&&chosen.length<3;j++)if(chosen.indexOf(j)<0)chosen.push(j);
    state.missionIds=chosen.map(function(i){return MISSION_POOL[i].id;});save();
  }
}
function currentMissions(){ensureMissions();return (state.missionIds||[]).map(function(id){return MISSION_POOL.filter(function(m){return m.id===id;})[0];}).filter(Boolean);}
function bumpMissions(kind,slug){
  ensureMissions();var act=getAct(slug);var cats=ACT_CATS[slug]||[];
  currentMissions().forEach(function(m){
    var done=state.missions[m.id]||0;if(done>=m.n)return;var hit=false;
    if(kind==='action'){
      if(m.type==='actions')hit=true;
      else if(m.type==='category'&&cats.indexOf(m.cat)>=0)hit=true;
      else if(m.type==='diffmin'&&act&&act.diff>=m.diff)hit=true;
    } else if(kind==='lesson'&&m.type==='lessons')hit=true;
    if(hit){state.missions[m.id]=done+1;if(state.missions[m.id]>=m.n){state.xp+=m.xp;toast('🎯 Mission done: '+m.t+' +'+m.xp+' XP');}}
  });
}

/* ---------------- impact graph (GitHub-style) ---------------- */
function longestStreak(){
  var days=Object.keys(state.log).filter(function(d){return state.log[d]>0}).sort();
  if(!days.length)return 0;var best=1,cur=1;
  for(var i=1;i<days.length;i++){
    var prev=new Date(days[i-1]),now=new Date(days[i]);
    if((now-prev)===86400000){cur++;best=Math.max(best,cur);}else{cur=1;}
  }
  return best;
}
function graphHtml(){
  var weeks=53, cells=weeks*7, end=new Date();
  var dow=end.getDay(); // align so last column ends today
  var start=new Date(end.getTime()-(cells-1-(6-dow))*86400000);
  var html='<div class="graphwrap" id="graphwrap"><div class="graph">';
  var d=new Date(start), active=0;
  for(var w=0;w<weeks;w++){
    html+='<div class="gcol">';
    for(var r=0;r<7;r++){
      var key=dkey(d);
      var c=state.log[key]||0; if(c>0)active++;
      var future=d>end;
      var bg=future?'transparent':(c===0?'var(--g0)':c===1?'var(--g1)':c===2?'var(--g2)':'var(--g3)');
      html+='<div class="gcell" title="'+key+': '+c+' action'+(c===1?'':'s')+'" style="background:'+bg+'"></div>';
      d=new Date(d.getTime()+86400000);
    }
    html+='</div>';
  }
  html+='</div></div>';
  var totalActive=Object.keys(state.log).filter(function(k){return state.log[k]>0}).length;
  html+='<div class="muted" style="margin-top:8px">'+totalActive+' active days · longest streak '+longestStreak()+' days'+
        ' <span style="float:right">Less <span class="gcell" style="display:inline-block;background:var(--g0);vertical-align:middle"></span>'+
        '<span class="gcell" style="display:inline-block;background:var(--g1);vertical-align:middle;margin:0 2px"></span>'+
        '<span class="gcell" style="display:inline-block;background:var(--g2);vertical-align:middle;margin-right:2px"></span>'+
        '<span class="gcell" style="display:inline-block;background:var(--g3);vertical-align:middle"></span> More</span></div>';
  return html;
}

/* Grows with your current streak; rests (never dies) if you miss days. */
var GROVE_STAGES=[[0,'🌰','Sleeping seed'],[1,'🌱','Sprout'],[3,'🌿','Seedling'],[7,'🌳','Young tree'],[14,'🌳','Strong tree'],[30,'🌳','Flourishing tree'],[60,'🌲','Mighty grove'],[100,'🌲','Ancient grove']];

function groveStageIdx(s){var i=0;for(var j=0;j<GROVE_STAGES.length;j++)if(s>=GROVE_STAGES[j][0])i=j;return i;}

function heroTry(c,title,onFail){
  wikiGet(title,function(d){
    if(!d||!d.img){onFail();return;}
    /* Wikimedia refuses to upscale past the original size — try 640px, then the raw thumb. */
    var cands=[d.img.replace(/\/(\d+)px-/,'/640px-'),d.img].filter(function(u,i,a){return a.indexOf(u)===i});
    (function attempt(i){
      if(i>=cands.length){onFail();return;}
      var img=cands[i];
      function show(){
        var e2=document.getElementById('heroimg');if(!e2)return; /* user may have left Home */
        e2.style.backgroundImage='url("'+img+'")';e2.classList.add('show');
        var cap=document.getElementById('herocap');
        if(cap){cap.innerHTML=c.emo+' '+esc(d.t||c.name);cap.style.display='inline-block';cap.setAttribute('onclick','openCat(\''+c.slug+'\')');cap.setAttribute('aria-label','Photo: '+(d.t||c.name)+' — open category');}
        _heroUrl=img;
      }
      if(_heroUrl===img){show();return;} /* already loaded this session — no flash */
      var pre=new Image();pre.onload=show;pre.onerror=function(){attempt(i+1);};pre.src=img;
    })(0);
  });
}

function celebrateBurst(){
  try{
    if(navigator.vibrate)navigator.vibrate(35);
    if(typeof matchMedia==='function'&&matchMedia('(prefers-reduced-motion: reduce)').matches)return;
    var host=document.createElement('div');host.className='burst';host.setAttribute('aria-hidden','true');
    var glyphs=['🌱','✨','🍃','💚','🌿'];
    for(var i=0;i<18;i++){
      var sp=document.createElement('span');sp.textContent=glyphs[i%glyphs.length];
      var ang=Math.random()*2*Math.PI,dist=60+Math.random()*120;
      sp.style.left='50%';sp.style.top='55%';
      sp.style.setProperty('--dx',Math.cos(ang)*dist+'px');
      sp.style.setProperty('--dy',(Math.sin(ang)*dist-80)+'px');
      sp.style.setProperty('--rot',(Math.random()*240-120)+'deg');
      sp.style.animationDelay=(Math.random()*120)+'ms';
      host.appendChild(sp);
    }
    document.body.appendChild(host);
    setTimeout(function(){if(host.parentNode)host.parentNode.removeChild(host);},1200);
  }catch(e){}
}

function impactPhrase(metric,v){
  if(metric==='carbon_kg')return['🌍 '+round(v)+' kg CO₂e saved','≈ '+Math.round(v/0.17).toLocaleString()+' km of car driving avoided'];
  if(metric==='plastic_kg')return['♻️ '+round(v)+' kg plastic avoided','≈ '+Math.round(v*125).toLocaleString()+' plastic bags never used'];
  if(metric==='trees')return['🌳 '+Math.round(v)+' native trees','absorbing ≈ '+Math.round(v*21).toLocaleString()+' kg CO₂ every year after'];
  if(metric==='money')return['💚 $'+Math.round(v).toLocaleString()+' donated','funding ranger patrols, habitat and rescues'];
  if(metric==='animals')return['🐾 ≈ '+Math.round(v).toLocaleString()+' animals helped','directly, because of you'];

function catSpecies(c){return (c.species&&c.species.length)?c.species:(SPECIES[c.slug]||[]);}
var WIKI_TTL=2592e6; /* 30 days */
function wikiGet(title,cb){
  var key='wiki_'+title,c=LS.get(key,null);
  if(c&&c.d&&(Date.now()-c.ts)<WIKI_TTL){cb(c.d);return;}
  fetch('https://en.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(title.split(' ').join('_')))
    .then(function(r){return r.ok?r.json():null})
    .then(function(d){
      if(d&&d.extract){
        var slim={t:d.title,x:d.extract,desc:d.description||'',img:(d.thumbnail&&d.thumbnail.source)||null,big:(d.originalimage&&d.originalimage.source)||null,url:(d.content_urls&&d.content_urls.desktop&&d.content_urls.desktop.page)||null};
        LS.set(key,{ts:Date.now(),d:slim});cb(slim);
      } else cb((c&&c.d)||null);
    }).catch(function(){cb((c&&c.d)||null);});
}
function gbifGet(name,cb){
  var key='gbif_'+name,c=LS.get(key,null);
  if(c&&c.d&&(Date.now()-c.ts)<WIKI_TTL){cb(c.d);return;}
  fetch('https://api.gbif.org/v1/species/match?name='+encodeURIComponent(name))
    .then(function(r){return r.ok?r.json():null})
    .then(function(m){
      if(!m||!m.usageKey){cb((c&&c.d)||null);return;}
      fetch('https://api.gbif.org/v1/occurrence/search?taxonKey='+m.usageKey+'&limit=0')
        .then(function(r){return r.ok?r.json():null})
        .then(function(o){var slim={sci:m.scientificName||'',n:(o&&o.count)||0,key:m.usageKey};LS.set(key,{ts:Date.now(),d:slim});cb(slim);})
        .catch(function(){cb({sci:m.scientificName||'',n:0,key:m.usageKey});});
    }).catch(function(){cb((c&&c.d)||null);});
}
function speciesListHtml(c){
  var sp=catSpecies(c);
  if(!sp.length)return emptyMsg('Species profiles are being added.');
  return sp.map(function(n,i){
    return '<div class="lesson" style="display:flex;gap:12px;align-items:center" onclick="openSpecies(\''+encodeURIComponent(n)+'\',\''+c.slug+'\')">'+
      '<div id="spimg'+i+'" style="width:56px;height:56px;border-radius:12px;background:var(--line);flex:none;background-size:cover;background-position:center" aria-hidden="true"></div>'+
      '<div style="min-width:0"><b>'+esc(n)+'</b><div class="muted" id="spdesc'+i+'">Loading…</div></div></div>';
  }).join('')+'<div class="muted" style="margin-top:6px;font-size:11px">Photos & summaries: Wikipedia (CC BY-SA), loaded live and saved for offline. Records: GBIF.</div>';
}
function fillSpeciesList(c){
  catSpecies(c).forEach(function(n,i){
    wikiGet(n,function(d){
      var de=document.getElementById('spdesc'+i),im=document.getElementById('spimg'+i);
      if(!de||!im)return;
      if(d){de.textContent=d.desc||(d.x?d.x.slice(0,70)+'…':'');if(d.img)im.style.backgroundImage='url("'+d.img+'")';}
      else de.textContent='Offline — open once online to load.';
    });
  });
}
function fillWikiOverview(c){
  wikiGet(c.wiki||CAT_WIKI[c.slug]||c.name,function(d){
    var e=document.getElementById('wikiOv');if(!e||!d)return;
    e.innerHTML='<h2 class="sec">About</h2><div class="card">'+
      (d.img?'<div style="height:140px;border-radius:12px;background:url(\''+d.img+'\') center/cover" aria-hidden="true"></div>':'')+
      '<p style="line-height:1.6;margin-bottom:6px">'+esc(d.x)+'</p>'+
      (d.url?'<a class="evidence" href="'+d.url+'" target="_blank" rel="noopener">Wikipedia (CC BY-SA) ↗</a>':'');
  });
}
function openSpecies(enc,slug){
  var n=decodeURIComponent(enc);var c=CATS.filter(function(x){return x.slug===slug})[0];
  var h='<button class="chip" onclick="openCat(\''+slug+'\')">← '+esc(c?c.name:'Back')+'</button>'+
    '<div class="card" style="margin-top:10px">'+
    '<div id="spBig" style="height:180px;border-radius:14px;background:var(--line);background-size:cover;background-position:center" aria-hidden="true"></div>'+
    '<h2 style="margin:12px 0 2px">'+esc(n)+'</h2><div class="muted" id="spTag"></div>'+
    '<p id="spX" style="line-height:1.65">Loading…</p>'+
    '<div id="spGbif" class="muted"></div><div id="spLinks" style="margin-top:8px"></div>'+
    '<div class="muted" style="margin-top:10px;font-size:11px">Text & photo: Wikipedia (CC BY-SA). Sighting records: GBIF.</div></div>';
  openSheet(h);
  wikiGet(n,function(d){
    var x=document.getElementById('spX');if(!x)return;
    if(d){
      x.textContent=d.x;
      var tg=document.getElementById('spTag');if(tg)tg.textContent=d.desc||'';
      var bg=document.getElementById('spBig');if(bg&&(d.big||d.img))bg.style.backgroundImage='url("'+(d.big||d.img)+'")';
      var lk=document.getElementById('spLinks');if(lk&&d.url)lk.innerHTML='<a class="evidence" href="'+d.url+'" target="_blank" rel="noopener">Read more on Wikipedia ↗</a>';
    } else x.textContent="You're offline. Open this once online and it will be saved for offline reading.";
  });
  gbifGet(n,function(g){
    var e=document.getElementById('spGbif');if(!e||!g||!g.sci)return;
    e.innerHTML='🔬 <i>'+esc(g.sci)+'</i>'+(g.n?' · '+g.n.toLocaleString()+' recorded sightings (GBIF)':'');
  });
}
/* ---- backup / restore ---- */
function exportProgress(){
  var data={_app:'WildHope',_exported:new Date().toISOString()};
  SAVE_KEYS.forEach(function(k){data[k]=state[k];});
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='wildhope-backup-'+today()+'.json';document.body.appendChild(a);a.click();a.remove();
  setTimeout(function(){URL.revokeObjectURL(url)},1000);state.lastBackup=today();save();toast('Backup saved 💾');if(tab==='home')render();
}
function importProgress(ev){
  var f=ev.target.files[0];if(!f)return;var rd=new FileReader();
  rd.onload=function(){try{var d=JSON.parse(rd.result);
    if(d._app!=='WildHope'&&!confirm('This may not be a WildHope backup. Import anyway?'))return;
    if(!confirm('Restore this backup? It replaces your current progress.'))return;
    SAVE_KEYS.forEach(function(k){if(d[k]!==undefined)state[k]=d[k];});
    state.lastBackup=today();save();applyTheme();render();toast('Progress restored ✓');
  }catch(e){toast('That file could not be read');}};
  rd.readAsText(f);ev.target.value='';
}
/* ---- share card (canvas image) ---- */
function drawMiniGraph(x,ox,oy,cell){
  var weeks=40,gap=5,end=new Date();var d=new Date(end.getTime()-(weeks*7-1)*86400000);
  for(var w=0;w<weeks;w++){for(var r=0;r<7;r++){var key=dkey(d);var c=state.log[key]||0;
    x.fillStyle=c===0?'rgba(255,255,255,.16)':c===1?'#B2F1CC':c===2?'#63c48b':'#ffffff';
    x.fillRect(ox+w*(cell+gap),oy+r*(cell+gap),cell,cell);d=new Date(d.getTime()+86400000);}}
}
function shareImpact(){
  var lvl=levelForXp(state.xp);var acts=Object.keys(state.done).length;
  var cv=document.createElement('canvas');cv.width=1080;cv.height=1080;var x=cv.getContext('2d');
  var g=x.createLinearGradient(0,0,1080,1080);g.addColorStop(0,'#2E6B4F');g.addColorStop(1,'#0B3D4C');x.fillStyle=g;x.fillRect(0,0,1080,1080);
  x.fillStyle='#ffffff';x.textAlign='center';
  x.font='600 66px -apple-system,Segoe UI,Arial';x.fillText('🌿 WildHope',540,150);
  x.font='italic 40px Georgia,serif';x.fillStyle='rgba(255,255,255,.9)';x.fillText('Small actions. Real hope.',540,214);
  x.fillStyle='#ffffff';x.font='700 240px -apple-system,Segoe UI,Arial';x.fillText(String(state.streak),540,500);
  x.font='500 46px -apple-system,Segoe UI,Arial';x.fillText('day streak 🔥',540,560);
  x.font='600 42px -apple-system,Segoe UI,Arial';x.fillText('✅ '+acts+' actions    ·    Level '+lvl,540,662);
  drawMiniGraph(x,80,720,18);
  x.font='500 36px -apple-system,Segoe UI,Arial';x.fillStyle='rgba(255,255,255,.9)';x.fillText('Join me — every action counts',540,1010);
  cv.toBlob(function(blob){
    if(!blob){toast('Could not create image');return;}
    var file=new File([blob],'wildhope-impact.png',{type:'image/png'});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      navigator.share({files:[file],title:'My WildHope impact',text:'Small actions, real hope 🌿'}).catch(function(){});
    }else{
      var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='wildhope-impact.png';document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(url)},1000);toast('Image saved — share it anywhere 📤');
    }
  },'image/png');
}
function downloadReminder(){
  var t=prompt('Daily reminder time (24h, HH:MM):','18:00');if(t==null)return;
  var m=/^([01]?\d|2[0-3]):([0-5]\d)$/.exec(t.trim());if(!m){toast('Use HH:MM, e.g. 18:00');return;}
  var d=new Date(),ds=''+d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2);
  var hh=('0'+m[1]).slice(-2),mm=m[2];
  var ics='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//WildHope//Reminder//EN\r\nBEGIN:VEVENT\r\nUID:wildhope-daily-'+Date.now()+'@wildhope\r\nDTSTAMP:'+ds+'T000000Z\r\nDTSTART:'+ds+'T'+hh+mm+'00\r\nRRULE:FREQ=DAILY\r\nSUMMARY:🌿 WildHope — one small action today\r\nDESCRIPTION:Learn one thing\\, do one thing. Keep your streak alive: https://yakir-ash.github.io/wildhope/\r\nEND:VEVENT\r\nEND:VCALENDAR\r\n';
  var blob=new Blob([ics],{type:'text/calendar'});var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='wildhope-daily-reminder.ics';document.body.appendChild(a);a.click();a.remove();
  setTimeout(function(){URL.revokeObjectURL(url)},1000);
  toast('Open the file to add it to your calendar 📅');
}
/* register service worker for offline/install */
if('serviceWorker'in navigator){window.addEventListener('load',function(){
  navigator.serviceWorker.register('sw.js').then(function(reg){
    reg.addEventListener('updatefound',function(){
      var nw=reg.installing;if(!nw)return;
      nw.addEventListener('statechange',function(){
        if(nw.state==='activated'&&navigator.serviceWorker.controller){
          toast('🌿 App updated — close & reopen to load it');
        }
      });
    });
  }).catch(function(){});
});}

/* ---- self-updating content: fetch content.json online, cache offline ---- */
var APP_V='v26';
var BUNDLED_VERSION=1, contentUpdated='';
function normalizeCourses(list){(list||[]).forEach(function(c){(c.lessons||[]).forEach(function(l){if(!l.quiz&&l.q!==undefined)l.quiz=[{q:l.q,opts:l.opts,a:l.a}];if(!l.quiz)l.quiz=[];if(l.body===undefined)l.body='';});});return list;}
function applyContent(d){
  if(!d)return;
  if(d.categories)CATS=d.categories;
  if(d.actions)ACTS=d.actions;
  if(d.courses)COURSES=normalizeCourses(d.courses);
  if(d.facts)FACTS=d.facts;
  if(d.stories)STORIES=d.stories;
  if(d.news)NEWS=d.news;
  if(d.updated)contentUpdated=d.updated;
  ACT_CATS={};CATS.forEach(function(c){(c.acts||[]).forEach(function(sl){(ACT_CATS[sl]=ACT_CATS[sl]||[]).push(c.slug);});});
}
function loadContent(){
  var cached=LS.get('contentCache',null);
  if(cached&&cached.version&&cached.version>=BUNDLED_VERSION)applyContent(cached);
  fetch('content.json?ts='+Date.now(),{cache:'no-store'}).then(function(r){return r.ok?r.json():null;}).then(function(d){
    if(d&&d.categories){LS.set('contentCache',d);applyContent(d);if(state.onboarded)render();}
  }).catch(function(){});
}
/* boot */
normalizeCourses(COURSES);
applyTheme();buildNav();
if(state.onboarded){document.getElementById('onboard').classList.add('hide');render();maybeRemind();}else{buildOb();}
loadContent();
</script>
